# Campus IoT - Docker Compose
# Spins up:
#   1. Eclipse Mosquitto (MQTT broker)
#   2. campus_engine     (Python simulation engine)
#   3. campus_dashboard  (Streamlit UI)
# All services share the 'iot_net' bridge network.

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"    # TCP (plain)
      - "8883:8883"     # TCP (TLS)
      - "9001:9001"     # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro   # whole dir: conf + passwd + acl
      - ./certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - iot_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-p", "1883", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  engine:
    build:
      context: ./engine_app
      dockerfile: Dockerfile
    container_name: campus_engine
    env_file:
      - .env
    networks:
      - iot_net
    volumes:
      - engine_data:/data
      - ./certs:/certs:ro
    ports:
      - "5700-5899:5700-5899/udp"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard_app/Dockerfile
    container_name: campus_dashboard
    environment:
      - SQLITE_DB_PATH=/data/campus.db
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    volumes:
      - engine_data:/data:ro
    ports:
      - "8501:8501"
    networks:
      - iot_net
    depends_on:
      - engine
    restart: unless-stopped

  nodered_master:
    build:
      context: .
      dockerfile: node-red/master/Dockerfile
    image: dic_iot-nodered_custom:latest
    container_name: nodered_master
    entrypoint: ["/usr/src/node-red/start-master.sh"]
    ports:
      - "1880:1880"
    networks:
      - iot_net
    volumes:
      - ./node-red:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Africa/Cairo
      - NODE_RED_FLOOR_COUNT=10
      - NODE_RED_WORKER_IMAGE=dic_iot-nodered_custom:latest
      - NODE_RED_WORKER_PREFIX=nodered_floor
      - NODE_RED_WORKER_PORT_BASE=1891
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - COAP_HOST=campus_engine
    depends_on:
      - mosquitto
    restart: unless-stopped

  mytb:
    restart: always
    image: thingsboard/tb-postgres
    ports:
      - "8080:9090"
      - "7070:7070"
      - "1884:1883"
      - "5683-5688:5683-5688/udp"
    environment:
      TB_QUEUE_TYPE: in-memory
    networks:
      - iot_net
    depends_on:
      - mosquitto 
    volumes:
      - ~/.mytb-data:/data
      - ~/.mytb-logs:/var/log/thingsboard
  tb-gateway:
    image: thingsboard/tb-gateway:3.7-stable
    container_name: tb-gateway
    restart: always

    # Ports bindings - required by some connectors
    ports:
        - "5000:5000" # Comment if you don't use REST connector and change if you use another port
        # Uncomment and modify the following ports based on connector usage:
#        - "1052:1052" # BACnet connector
#        - "5026:5026" # Modbus TCP connector (Modbus Slave)
#        - "50000:50000/tcp" # Socket connector with type TCP
#        - "50000:50000/udp" # Socket connector with type UDP

    # Necessary mapping for Linux
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # Environment variables
    environment:
      - host=mytb
      - port=1883
      - accessToken=6Uq9dZnyZiSQWo1UBPiD
    # Volumes bind
    volumes:
      - tb-gw-config:/thingsboard_gateway/config
      - tb-gw-logs:/thingsboard_gateway/logs
      - ./certs:/certs:ro
    depends_on:
      - mosquitto
      - mytb
    networks:
      - iot_net 
volumes:
  mosquitto_data:
  mosquitto_log:
  engine_data:
  tb-gw-config:
    name: tb-gw-config
  tb-gw-logs:
    name: tb-gw-logs
  tb-gw-extensions:
    name: tb-gw-extensions

networks:
  iot_net:
    driver: bridge
