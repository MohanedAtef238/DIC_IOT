      <<: *nodered-env
      FLOOR_NUMBER: "09"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_09}
      FLOW_FILE: "flow_floor09.json"

  nodered_floor_10:
    <<: *nodered-base
    container_name: nodered_floor_10
    ports:
      - "1900:1880"
    volumes:
      - ./node-red/f10:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "10"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_10}
      FLOW_FILE: "flow_floor10.json"

  mytb:
    container_name: mytb
    restart: always
    image: thingsboard/tb-postgres
    ports:
      - "8080:9090"
      - "7070:7070"
      - "1884:1883"
      - "5683-5688:5683-5688/udp"
    environment:
      TB_QUEUE_TYPE: in-memory
      JAVA_OPTS: "-Xms1G -Xmx2G"
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - iot_net
    volumes:
      - ~/.mytb-data:/data
      - ~/.mytb-logs:/var/log/thingsboard
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "bash", "-c", "(echo > /dev/tcp/localhost/8080) >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 12
