# Campus IoT - Docker Compose
# Spins up:
#   1. Eclipse Mosquitto (MQTT broker)
#   2. campus_engine     (Python simulation engine)
#   3. campus_dashboard  (Streamlit UI)
# All services share the 'iot_net' bridge network.

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"     # TCP
      - "9001:9001"     # WebSocket
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - iot_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "healthcheck", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  engine:
    build:
      context: ./engine_app
      dockerfile: Dockerfile
    container_name: campus_engine
    env_file:
      - .env
    networks:
      - iot_net
    volumes:
      - engine_data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard_app/Dockerfile
    container_name: campus_dashboard
    environment:
      - SQLITE_DB_PATH=/data/campus.db
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    volumes:
      - engine_data:/data:ro
    ports:
      - "8501:8501"
    networks:
      - iot_net
    depends_on:
      - engine
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  engine_data:

networks:
  iot_net:
    driver: bridge
