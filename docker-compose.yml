    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "06"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_06}
      FLOW_FILE: "flow_floor06.json"

  nodered_floor_07:
    <<: *nodered-base
    container_name: nodered_floor_07
    ports:
      - "1897:1880"
    volumes:
      - ./node-red/f07:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "07"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_07}
      FLOW_FILE: "flow_floor07.json"

  nodered_floor_08:
    <<: *nodered-base
    container_name: nodered_floor_08
    ports:
      - "1898:1880"
    volumes:
      - ./node-red/f08:/data
