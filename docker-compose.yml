# Campus IoT - Docker Compose
# Spins up:
#   1. Eclipse Mosquitto (MQTT broker)
#   2. campus_engine     (Python simulation engine)
#   3. campus_dashboard  (Streamlit UI)
# All services share the 'iot_net' bridge network.

# ── Node-RED floor worker template ──────────────────────────────────
# build: is intentionally NOT in this anchor — only nodered_floor_01 defines it.
# All other floor services inherit the image tag and skip the redundant build step,
# which prevents BuildKit from trying to tag the same image name in parallel.
x-nodered-base: &nodered-base
  image: dic_iot-nodered_worker:latest
  init: true
  stop_grace_period: 15s
  networks:
    - iot_net
  deploy:
    resources:
      limits:
        memory: 1G
  depends_on:
    mosquitto:
      condition: service_healthy
    engine:
      condition: service_started
    mytb:
      condition: service_started
  restart: unless-stopped

x-nodered-env: &nodered-env
  TZ: Africa/Cairo
  MQTT_HOST: mosquitto
  MQTT_PORT: "8883"
  COAP_HOST: campus_engine
  NODE_OPTIONS: "--max-old-space-size=1024"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883" # TCP (plain)
      - "8883:8883" # TCP (TLS)
      - "9001:9001" # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro # whole dir: conf + passwd + acl
      - ./certs:/mosquitto/certs:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - iot_net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mosquitto_pub", "-h", "localhost", "-p", "1883", "-t", "healthcheck", "-m", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  engine:
    build:
      context: ./engine_app
      dockerfile: Dockerfile
    container_name: campus_engine
    env_file:
      - .env
    networks:
      - iot_net
    volumes:
      - engine_data:/data
      - ./certs:/certs:ro
    ports:
      - "5700-5899:5700-5899/udp"
    depends_on:
      mosquitto:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard_app/Dockerfile
    container_name: campus_dashboard
    environment:
      - SQLITE_DB_PATH=/data/campus.db
      - MQTT_HOST=mosquitto
      - MQTT_PORT=8883
      - MQTT_CA_CERT=/certs/ca.crt
      - MQTT_CLIENT_CERT=/certs/engine.crt
      - MQTT_CLIENT_KEY=/certs/engine.key
    volumes:
      - engine_data:/data:ro
      - ./certs:/certs:ro
    ports:
      - "8501:8501"
    networks:
      - iot_net
    depends_on:
      - engine
    restart: unless-stopped

  nodered_floor_01:
    <<: *nodered-base
    build:
      context: .
      dockerfile: node-red/master/Dockerfile
    container_name: nodered_floor_01
    ports:
      - "1891:1880"
    volumes:
      - ./node-red/f01:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "01"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_01}
      FLOW_FILE: "flow_floor01.json"

  nodered_floor_02:
    <<: *nodered-base
    container_name: nodered_floor_02
    ports:
      - "1892:1880"
    volumes:
      - ./node-red/f02:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "02"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_02}
      FLOW_FILE: "flow_floor02.json"

  nodered_floor_03:
    <<: *nodered-base
    container_name: nodered_floor_03
    ports:
      - "1893:1880"
    volumes:
      - ./node-red/f03:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "03"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_03}
      FLOW_FILE: "flow_floor03.json"

  nodered_floor_04:
    <<: *nodered-base
    container_name: nodered_floor_04
    ports:
      - "1894:1880"
    volumes:
      - ./node-red/f04:/data
      - ./certs:/certs:ro
    environment:
      <<: *nodered-env
      FLOOR_NUMBER: "04"
      TB_ACCESS_TOKEN: ${GATEWAY_TOKEN_04}
      FLOW_FILE: "flow_floor04.json"

  nodered_floor_05:
    <<: *nodered-base
    container_name: nodered_floor_05
