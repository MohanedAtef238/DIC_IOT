# Mosquitto MQTT broker configuration

# --- Global directives (must come before any listener stanza) ---
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# --- Listeners ---
# Plain TCP — used by dashboard, healthcheck, and nodered (no credentials needed)
listener 1883
listener_allow_anonymous true

# TLS — used by engine_app (authenticated, no anonymous access)
listener 8883
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile  /mosquitto/certs/mosquitto.key
require_certificate true
use_identity_as_username true
tls_version tlsv1.2
listener_allow_anonymous false
acl_file      /mosquitto/config/mosquitto.acl

# WebSocket — internal tooling only, no auth
listener 9001
protocol websockets
listener_allow_anonymous true