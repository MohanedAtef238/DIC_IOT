# Mosquitto MQTT broker configuration

# --- Global directives (must come before any listener stanza) ---
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# --- Listeners ---
# Plain TCP (unencrypted) — used by dashboard and healthcheck
listener 1883
allow_anonymous true

# TLS — used by engine_app
listener 8883
cafile   /mosquitto/certs/ca.crt
certfile /mosquitto/certs/mosquitto.crt
keyfile  /mosquitto/certs/mosquitto.key
require_certificate false
tls_version tlsv1.2
allow_anonymous true

# WebSocket
listener 9001
protocol websockets
allow_anonymous true